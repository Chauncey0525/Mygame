{% extends "base.html" %}

{% block title %}召唤 - 历史英雄对决{% endblock %}

{% block content %}
<div class="space-y-4">
    <!-- 召唤横幅 -->
    <div class="card" style="background: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%); border-color: #a855f7;">
        <div class="card-body" style="text-align: center; padding: 2rem;">
            <h2 style="font-size: 2rem; font-weight: bold; color: white; margin-bottom: 0.5rem;">✨ 英雄召唤</h2>
            <p style="color: #e2e8f0;">召唤历史英雄，组建你的最强队伍</p>
        </div>
    </div>

    <!-- 保底信息 -->
    <div class="card">
        <div class="card-body">
            <div class="grid grid-2">
                <div style="text-align: center; padding: 1rem; background: #334155; border-radius: 8px;">
                    <div style="font-size: 0.875rem; color: #94a3b8;">史诗保底</div>
                    <div style="font-size: 1.5rem; font-weight: bold; color: #a855f7;">{{ player.pity_count }}/50</div>
                    <div class="progress" style="margin-top: 0.5rem;">
                        <div class="progress-bar" style="width: {{ (player.pity_count / 50 * 100) }}%; background: #a855f7;"></div>
                    </div>
                </div>
                <div style="text-align: center; padding: 1rem; background: #334155; border-radius: 8px;">
                    <div style="font-size: 0.875rem; color: #94a3b8;">传说保底</div>
                    <div style="font-size: 1.5rem; font-weight: bold; color: #f59e0b;">{{ player.legendary_pity_count }}/100</div>
                    <div class="progress" style="margin-top: 0.5rem;">
                        <div class="progress-bar" style="width: {{ (player.legendary_pity_count / 100 * 100) }}%; background: #f59e0b;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 召唤按钮 -->
    <div class="grid grid-3" style="gap: 1rem;">
        <button onclick="doSummon('once')" class="btn btn-primary btn-block" style="padding: 1.5rem;">
            <div style="font-size: 1.25rem;">单抽</div>
            <div style="font-size: 0.875rem; opacity: 0.8;">100 💎</div>
        </button>
        <button onclick="doSummon('ten')" class="btn btn-warning btn-block" style="padding: 1.5rem;">
            <div style="font-size: 1.25rem;">十连</div>
            <div style="font-size: 0.875rem; opacity: 0.8;">900 💎</div>
        </button>
        <button onclick="doSummon('ticket')" class="btn btn-success btn-block" style="padding: 1.5rem;">
            <div style="font-size: 1.25rem;">召唤券</div>
            <div style="font-size: 0.875rem; opacity: 0.8;">{{ player.summon_tickets }} 张</div>
        </button>
    </div>

    <!-- 概率说明 -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">📝 概率说明</h3>
        </div>
        <div class="card-body">
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <span class="badge bg-rarity-common">普通</span>
                    <div style="font-size: 1.25rem; font-weight: bold; margin-top: 0.25rem;">60%</div>
                </div>
                <div>
                    <span class="badge bg-rarity-rare">稀有</span>
                    <div style="font-size: 1.25rem; font-weight: bold; margin-top: 0.25rem;">30%</div>
                </div>
                <div>
                    <span class="badge bg-rarity-epic">史诗</span>
                    <div style="font-size: 1.25rem; font-weight: bold; margin-top: 0.25rem;">8%</div>
                </div>
                <div>
                    <span class="badge bg-rarity-legendary">传说</span>
                    <div style="font-size: 1.25rem; font-weight: bold; margin-top: 0.25rem;">2%</div>
                </div>
            </div>
            <p style="font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 1rem;">
                50抽必出史诗，100抽必出传说
            </p>
        </div>
    </div>

    <!-- 召唤结果弹窗 -->
    <div id="summonModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="card-title">✨ 召唤结果</h3>
                <button class="modal-close" onclick="closeSummonModal()">&times;</button>
            </div>
            <div class="modal-body" id="summonResults" style="text-align: center;">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>
</div>

<script>
async function doSummon(type) {
    const result = await apiCall('/api/summon', { type: type });
    if (result.success) {
        showSummonResults(result.results);
        // 更新保底显示
        setTimeout(() => location.reload(), 2000);
    } else {
        alert(result.error || '召唤失败');
    }
}

function showSummonResults(results) {
    const container = document.getElementById('summonResults');
    container.innerHTML = '';
    
    results.forEach((char, index) => {
        const div = document.createElement('div');
        div.className = 'summon-card';
        div.style.animationDelay = (index * 0.1) + 's';
        div.style.background = 'rgba(51, 65, 85, 0.8)';
        div.style.margin = '0.5rem';
        div.style.display = 'inline-block';
        div.style.padding = '1rem';
        div.style.borderRadius = '8px';
        div.style.border = '2px solid ' + getRarityColor(char.rarity);
        
        div.innerHTML = `
            <div style="width: 80px; height: 80px; border-radius: 50%; overflow: hidden; margin: 0 auto; border: 3px solid ${getRarityColor(char.rarity)};">
                <img src="${char.avatar}" alt="${char.name}" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div style="margin-top: 0.5rem; font-weight: bold; color: white;">${char.name}</div>
            <span class="badge" style="background: ${getRarityColor(char.rarity)};">${getRarityName(char.rarity)}</span>
            ${char.is_new ? '<span class="badge" style="background: #22c55e; margin-left: 0.25rem;">NEW!</span>' : ''}
        `;
        
        container.appendChild(div);
    });
    
    document.getElementById('summonModal').classList.add('active');
}

function closeSummonModal() {
    document.getElementById('summonModal').classList.remove('active');
}

function getRarityColor(rarity) {
    const colors = {
        'common': '#9ca3af',
        'rare': '#3b82f6',
        'epic': '#a855f7',
        'legendary': '#f59e0b'
    };
    return colors[rarity] || '#9ca3af';
}

function getRarityName(rarity) {
    const names = {
        'common': '普通',
        'rare': '稀有',
        'epic': '史诗',
        'legendary': '传说'
    };
    return names[rarity] || '普通';
}
</script>
{% endblock %}
